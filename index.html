<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest List - Arleta & Irvis</title>

<!-- Czcionka Lovelace z Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lovelace:wght@700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Lovelace', cursive;
  background-color: #f2e5d8;
  margin: 0;
  padding: 0;
  color: #082567;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  background: #fffaf4;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  position: relative;
}

h1 {
  text-align: center;
  font-size: 2em;
  margin-bottom: 20px;
  color: #082567;
}

/* Elegancka grafika u góry */
.header-img {
  display: block;
  margin: 0 auto 20px auto;
  width: 150px;
  opacity: 0.7;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: 'Lovelace', cursive;
  font-weight: 700;
  color: #082567;
}

textarea {
  resize: vertical;
}

button {
  background: #082567;
  color: #f2e5d8;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Lovelace', cursive;
  font-weight: 700;
  margin-top: 10px;
  width: 100%;
}

button:hover {
  background: #073059;
}

.guest {
  border: 1px solid #eee;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  background: #fff7ef;
}

.success {
  text-align: center;
  font-weight: bold;
  font-size: 1.3em;
  margin-top: 20px;
  color: #082567;
}
</style>
</head>

<body>

<div class="container">
<img src="https://i.ibb.co/Z1YH0vN/elegant-flower.png" alt="Elegancka grafika" class="header-img">

<h1 id="title"></h1>

<form id="form">

<!-- Główna osoba -->
<input id="name" required placeholder="Imię i nazwisko">
<input id="phone" placeholder="Telefon">
<select id="attendance" required>
  <option value="">--</option>
  <option value="yes"></option>
  <option value="no"></option>
</select>
<select id="menu">
  <option value="standard"></option>
  <option value="vege"></option>
</select>
<input id="allergies" placeholder="Alergie">

<h3 id="guestsTitle"></h3>
<div id="guests"></div>
<button type="button" onclick="addGuest()">+ Dodaj osobę</button>

<button type="submit" id="submitBtn"></button>
</form>

<div class="success" id="success"></div>
</div>

<script>
const lang = navigator.language.startsWith('es') ? 'es' : 'pl';

const t = {
  pl: {
    title: "Arleta i Irvis pobierają się 12.12.2026. Zapamiętaj tę datę!",
    yes: "Potwierdzam",
    no: "Nie przyjdę",
    guests: "Osoby towarzyszące",
    submit: "Wyślij",
    success: "Dziękujemy za potwierdzenie",
    closed: "Formularz zamknięty",
    menu1: "Standard",
    menu2: "Wege",
    allergy: "Alergie",
    child: "Dziecko <16"
  },
  es: {
    title: "¡Arleta e Irvis se casan el 12.12.2026! ¡Guarda esta fecha!",
    yes: "Confirmo asistencia",
    no: "No asistiré",
    guests: "Acompañantes",
    submit: "Enviar",
    success: "Gracias por confirmar",
    closed: "Formulario cerrado",
    menu1: "Estándar",
    menu2: "Vegetariano",
    allergy: "Alergias",
    child: "Niño <16"
  }
}[lang];

// Teksty na stronie
document.getElementById("title").innerText = t.title;
document.querySelector("#attendance option[value='yes']").textContent = t.yes;
document.querySelector("#attendance option[value='no']").textContent = t.no;
document.getElementById("guestsTitle").innerText = t.guests;
document.getElementById("submitBtn").innerText = t.submit;

// Dodawanie osoby towarzyszącej
function addGuest() {
  const div = document.createElement("div");
  div.className = "guest";
  div.innerHTML = `
    <input placeholder="Imię i nazwisko">
    <select>
      <option value="standard">${t.menu1}</option>
      <option value="vege">${t.menu2}</option>
    </select>
    <input placeholder="${t.allergy}">
    <label><input type="checkbox"> ${t.child}</label>
  `;
  document.getElementById("guests").appendChild(div);
}

// Daty zamknięcia formularza
const today = new Date();
const editDeadline = new Date("2026-10-31");
const finalDeadline = new Date("2027-06-01");

if(today > finalDeadline){
  document.getElementById("form").innerHTML = "<h2>"+t.closed+"</h2>";
}

// Wysyłanie danych
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  if(today > editDeadline){
    alert(t.closed);
    return;
  }

  const submissionId = Date.now();
  const people = [];

  // Główna osoba
  people.push({
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    attendance: document.getElementById("attendance").value,
    menu: document.getElementById("menu").value,
    allergies: document.getElementById("allergies").value,
    child: false
  });

  // Goście
  document.querySelectorAll(".guest").forEach(g=>{
    people.push({
      name: g.children[0].value,
      phone: document.getElementById("phone").value,
      attendance: document.getElementById("attendance").value,
      menu: g.children[1].value,
      allergies: g.children[2].value,
      child: g.children[3].children[0].checked
    });
  });

  people.forEach(p=>{
    fetch("https://script.google.com/macros/s/AKfycbyKcPoyQL3DRp0VEB8xINVHbg0k4i2YsV8xg28BXwybJZ5mgKX7af0VUHNfHTgoazjQ3g/exec", {
      method: "POST",
      body: JSON.stringify({
        submissionId: submissionId,
        ...p
      })
    });
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").innerText = t.success;
});
</script>

</body>
</html>
