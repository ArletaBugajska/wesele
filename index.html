<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guest List</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">

<style>
body {
  background: #f2e5d8;
  font-family: 'Playfair Display', serif;
  color: #082567;
  margin: 0;
}

/* SUBTELNE ZŁOTE TŁO */
body {
  background: #f2e5d8;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(212,175,55,0.25) 2px, transparent 2px),
    radial-gradient(circle at 80% 70%, rgba(212,175,55,0.2) 2px, transparent 2px);
  background-size: 100px 100px;
}

.container {
  max-width: 700px;
  margin: 50px auto;
  background: #fffaf4;
  padding: 35px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  border: 1px solid rgba(212,175,55,0.3);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #e0d5c5;
  background: #fff;
  font-size: 15px;
  color: #082567;
}

select {
  color: #082567;
}

button {
  background: linear-gradient(135deg, #082567, #0a3a8c);
  color: #f2e5d8;
  padding: 14px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  opacity: 0.9;
}

.guest {
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  background: #fff;
}

.success {
  text-align: center;
  font-size: 1.3em;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title"></h1>

<form id="form">

<input id="name" required placeholder="Imię i nazwisko">
<input id="phone" placeholder="Telefon">

<select id="attendance" required>
  <option value="">--</option>
  <option value="yes"></option>
  <option value="no"></option>
</select>

<!-- MENU JAK ALERGIE -->
<select id="menu" required>
  <option value="">Wybór menu</option>
  <option value="standard">Standard</option>
  <option value="vege">Wege</option>
</select>

<input id="allergies" placeholder="Alergie">

<h3 id="guestsTitle"></h3>
<div id="guests"></div>

<button type="button" onclick="addGuest()">+ Dodaj osobę</button>
<button type="submit" id="submitBtn"></button>

</form>

<div id="success" class="success"></div>

</div>

<script>
const lang = navigator.language.startsWith('es') ? 'es' : 'pl';

const t = {
  pl: {
    title: "Arleta i Irvis pobierają się 12.12.2026. Zapamiętaj tę datę!",
    yes: "Potwierdzam",
    no: "Nie przyjdę",
    guests: "Osoby towarzyszące",
    submit: "Wyślij",
    success: "Dziękujemy za potwierdzenie"
  },
  es: {
    title: "¡Arleta e Irvis se casan el 12.12.2026! ¡Guarda esta fecha!",
    yes: "Confirmo asistencia",
    no: "No asistiré",
    guests: "Acompañantes",
    submit: "Enviar",
    success: "Gracias por confirmar"
  }
}[lang];

document.getElementById("title").innerText = t.title;
document.querySelector("#attendance option[value='yes']").textContent = t.yes;
document.querySelector("#attendance option[value='no']").textContent = t.no;
document.getElementById("guestsTitle").innerText = t.guests;
document.getElementById("submitBtn").innerText = t.submit;

function addGuest(){
  const div = document.createElement("div");
  div.className = "guest";
  div.innerHTML = `
    <input placeholder="Imię i nazwisko">
    <select>
      <option value="">Wybór menu</option>
      <option value="standard">Standard</option>
      <option value="vege">Wege</option>
    </select>
    <input placeholder="Alergie">
    <label><input type="checkbox"> dziecko <16</label>
  `;
  document.getElementById("guests").appendChild(div);
}

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const submissionId = Date.now();
  const people = [];

  people.push({
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    attendance: document.getElementById("attendance").value,
    menu: document.getElementById("menu").value,
    allergies: document.getElementById("allergies").value,
    child: false
  });

  document.querySelectorAll(".guest").forEach(g=>{
    people.push({
      name: g.children[0].value,
      phone: document.getElementById("phone").value,
      attendance: document.getElementById("attendance").value,
      menu: g.children[1].value,
      allergies: g.children[2].value,
      child: g.children[3].children[0].checked
    });
  });

  people.forEach(p=>{
    fetch("https://script.google.com/macros/s/AKfycbyDkxoZCxJKXq8vxbmNYFlVCvaZRuD4KDk72o5Vf61-RxNNRGmakBbI7vt1LJi_dx3_/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        submissionId: submissionId,
        ...p
      })
    });
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").innerText = t.success;
});
</script>

</body>
</html>
