<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RSVP - Arleta i Irvis</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffffff, #eef2f9);
  padding: 20px;
  color: #082567;
}

.container {
  max-width: 650px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #082567;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.guest {
  border: 1px solid #eee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.success {
  text-align: center;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h1 id="title"></h1>

<form id="form">

<input id="name" required placeholder="Imię i nazwisko">
<input id="phone" placeholder="Telefon">

<select id="attendance" required>
<option value="">--</option>
<option value="yes"></option>
<option value="no"></option>
</select>

<h3 id="guestsTitle"></h3>

<div id="guests"></div>

<button type="button" onclick="addGuest()">+ Dodaj osobę</button>

<br><br>
<button type="submit" id="submitBtn"></button>

</form>

<div class="success" id="success"></div>

</div>

<script>
const lang = navigator.language.startsWith('es') ? 'es' : 'pl';

const t = {
  pl: {
    title: "Arleta i Irvis pobierają się 12.12.2026. Zapamiętaj tę datę!",
    yes: "Potwierdzam",
    no: "Nie przyjdę",
    guests: "Osoby",
    submit: "Wyślij",
    success: "Dziękujemy za potwierdzenie",
    closed: "Formularz zamknięty",
    menu1: "Standard",
    menu2: "Wege",
    allergy: "Alergie",
    child: "Dziecko <16"
  },
  es: {
    title: "¡Arleta e Irvis se casan el 12.12.2026! ¡Guarda esta fecha!",
    yes: "Confirmo asistencia",
    no: "No asistiré",
    guests: "Acompañantes",
    submit: "Enviar",
    success: "Gracias por confirmar",
    closed: "Formulario cerrado",
    menu1: "Estándar",
    menu2: "Vegetariano",
    allergy: "Alergias",
    child: "Niño <16"
  }
}[lang];

document.getElementById("title").innerText = t.title;
document.querySelector("#attendance option[value='yes']").textContent = t.yes;
document.querySelector("#attendance option[value='no']").textContent = t.no;
document.getElementById("guestsTitle").innerText = t.guests;
document.getElementById("submitBtn").innerText = t.submit;

function addGuest() {
  const div = document.createElement("div");
  div.className = "guest";
  div.innerHTML = `
    <input placeholder="Imię i nazwisko">
    <select>
      <option value="standard">${t.menu1}</option>
      <option value="vege">${t.menu2}</option>
    </select>
    <input placeholder="${t.allergy}">
    <label><input type="checkbox"> ${t.child}</label>
  `;
  document.getElementById("guests").appendChild(div);
}

// DATY
const today = new Date();
const editDeadline = new Date("2026-10-31");
const finalDeadline = new Date("2027-06-01");

if (today > finalDeadline) {
  document.getElementById("form").innerHTML = "<h2>" + t.closed + "</h2>";
}

document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (today > editDeadline) {
    alert(t.closed);
    return;
  }

  const submissionId = Date.now();

  const people = [];

  // główna osoba
  people.push({
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    attendance: document.getElementById("attendance").value,
    menu: "",
    allergies: "",
    child: false
  });

  // osoby towarzyszące
  document.querySelectorAll(".guest").forEach(g => {
    people.push({
      name: g.children[0].value,
      phone: document.getElementById("phone").value,
      attendance: document.getElementById("attendance").value,
      menu: g.children[1].value,
      allergies: g.children[2].value,
      child: g.children[3].children[0].checked
    });
  });

  people.forEach(p => {
    fetch("https://script.google.com/macros/s/AKfycbzu_lf-x5dHYyLxCefJ9KiPJKCvpnGJE-ckYjmYJSwbYj_XoVYCTIpH-BVQLwvktL1Pdw/exec", {
      method: "POST",
      body: JSON.stringify({
        submissionId: submissionId,
        ...p
      })
    });
  });

  document.getElementById("form").style.display = "none";
  document.getElementById("success").innerText = t.success;
});
</script>

</body>
</html>
