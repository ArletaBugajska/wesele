<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP - Arleta i Irvis</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffffff, #f3f6fb);
  margin: 0;
  padding: 20px;
  color: #082567;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

button {
  background: #082567;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.guest {
  border: 1px solid #eee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.success {
  text-align: center;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h1 id="title"></h1>

<form id="rsvpForm">
<input type="text" id="name" placeholder="Imię i nazwisko" required>
<input type="tel" id="phone" placeholder="Telefon">

<select id="attendance" required>
<option value="">--</option>
<option value="yes"></option>
<option value="no"></option>
</select>

<select id="menu">
<option value="standard"></option>
<option value="vege"></option>
</select>

<textarea id="allergies" placeholder="Alergie"></textarea>

<h3 id="guestsTitle"></h3>
<div id="guests"></div>
<button type="button" onclick="addGuest()">+</button>

<br><br>
<button type="submit" id="submitBtn"></button>
</form>

<div class="success" id="successMsg"></div>
</div>

<script>
const lang = navigator.language.startsWith('es') ? 'es' : 'pl';

const texts = {
  pl: {
    title: "Arleta i Irvis pobierają się 12.12.2026. Zapamiętaj tę datę!",
    attendanceYes: "Potwierdzam",
    attendanceNo: "Nie przyjdę",
    menuStandard: "Standard",
    menuVege: "Wege",
    guests: "Osoby towarzyszące",
    submit: "Wyślij",
    success: "Dziękujemy za potwierdzenie",
    closed: "Formularz zamknięty"
  },
  es: {
    title: "¡Arleta e Irvis se casan el 12.12.2026! ¡Guarda esta fecha!",
    attendanceYes: "Confirmo asistencia",
    attendanceNo: "No asistiré",
    menuStandard: "Estándar",
    menuVege: "Vegetariano",
    guests: "Acompañantes",
    submit: "Enviar",
    success: "Gracias por confirmar",
    closed: "Formulario cerrado"
  }
};

const t = texts[lang];

document.getElementById("title").innerText = t.title;

document.querySelector("#attendance option[value='yes']").textContent = t.attendanceYes;
document.querySelector("#attendance option[value='no']").textContent = t.attendanceNo;

document.querySelector("#menu option[value='standard']").textContent = t.menuStandard;
document.querySelector("#menu option[value='vege']").textContent = t.menuVege;

document.getElementById("guestsTitle").innerText = t.guests;
document.getElementById("submitBtn").innerText = t.submit;

function addGuest() {
  const div = document.createElement("div");
  div.className = "guest";
  div.innerHTML = `
    <input type="text" placeholder="Imię i nazwisko">
    <label><input type="checkbox"> dziecko <16</label>
  `;
  document.getElementById("guests").appendChild(div);
}

// BLOKADA DAT
const today = new Date();
const editDeadline = new Date("2026-10-31");
const finalDeadline = new Date("2027-06-01");

if (today > finalDeadline) {
  document.getElementById("rsvpForm").innerHTML = "<h2>" + t.closed + "</h2>";
}

document.getElementById("rsvpForm").addEventListener("submit", function(e) {
  e.preventDefault();

  if (today > editDeadline) {
    alert(t.closed);
    return;
  }

  const guests = [];
  document.querySelectorAll(".guest").forEach(g => {
    guests.push({
      name: g.children[0].value,
      child: g.children[1].children[0].checked
    });
  });

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    attendance: document.getElementById("attendance").value,
    menu: document.getElementById("menu").value,
    allergies: document.getElementById("allergies").value,
    guests: guests
  };

  fetch("TU_WKLEJ_LINK_Z_GOOGLE_SCRIPT", {
    method: "POST",
    body: JSON.stringify(data)
  });

  document.getElementById("rsvpForm").style.display = "none";
  document.getElementById("successMsg").innerText = t.success;
});
</script>

</body>
</html>
